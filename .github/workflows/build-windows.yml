name: Build Windows Release Artifact

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            lexiflash_app -> target
            lexiflash_nlp -> target

      - name: Check WebView2 runtime presence
        shell: pwsh
        run: |
          $candidates = @(
            "$Env:ProgramFiles(x86)\Microsoft\EdgeWebView\Application",
            "$Env:ProgramFiles\Microsoft\EdgeWebView\Application"
          )

          $found = $candidates | Where-Object { Test-Path $_ }
          if ($found.Count -gt 0) {
            Write-Host "WebView2 runtime detected on runner:"
            $found | ForEach-Object { Write-Host " - $_" }
          } else {
            Write-Host "WebView2 runtime was not found in the standard locations."
            Write-Host "The binary can still compile; runtime availability is validated when the artifact is tested on Windows."
          }

      - name: Build Windows release binary
        run: cargo build --release --manifest-path lexiflash_app/Cargo.toml

      - name: Download NLTK data for portable bundle
        shell: pwsh
        run: |
          python -m pip install --upgrade pip nltk
          python -c "import nltk; nltk.download('wordnet', download_dir='nltk_data'); nltk.download('stopwords', download_dir='nltk_data')"

      - name: Prepare release artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/LexiFlash/nlp-data | Out-Null
          Copy-Item lexiflash_app/target/release/lexiflash_app.exe dist/LexiFlash/LexiFlash.exe
          Copy-Item nltk_data/corpora/wordnet.zip dist/LexiFlash/nlp-data/wordnet.zip
          Copy-Item nltk_data/corpora/stopwords/english dist/LexiFlash/nlp-data/stopwords-english
          @"
          @echo off
          setlocal
          title LexiFlash
          rem Portable launcher for the Windows release bundle.
          rem Run this file after extracting the zip so LexiFlash can find its bundled NLP data.
          set "SCRIPT_DIR=%~dp0"
          set "WORDNET_ZIP_PATH=%SCRIPT_DIR%nlp-data\wordnet.zip"
          set "STOPWORDS_ENGLISH_PATH=%SCRIPT_DIR%nlp-data\stopwords-english"
          "%SCRIPT_DIR%LexiFlash.exe" %*
          "@ | Set-Content dist/LexiFlash/Launch-LexiFlash.bat

      - name: Package Windows release zip
        shell: pwsh
        run: |
          if (Test-Path dist/LexiFlash-windows.zip) {
            Remove-Item dist/LexiFlash-windows.zip -Force
          }
          Compress-Archive -Path dist/LexiFlash\* -DestinationPath dist/LexiFlash-windows.zip

      - name: Upload LexiFlash Windows zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: LexiFlash-windows-portable
          path: dist/LexiFlash-windows.zip
          if-no-files-found: error
